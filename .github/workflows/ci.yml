name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROTOC_VERSION: "25.3"

jobs:
  static-analyzers:
    name: Static analyzers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Check formatting
        run: |
          GOFMT_OUTPUT="$(gofmt -l .)"
          if [ -n "$GOFMT_OUTPUT" ]; then
            echo "gofmt found unformatted files:"
            echo "$GOFMT_OUTPUT"
            exit 1
          fi
          echo "gofmt check passed: no formatting issues found."

      - name: Go vet
        run: go vet -v ./...

  full-test:
    name: Full test suite
    needs: static-analyzers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-test.txt

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Go unit tests
        run: go test ./...

      - name: Build binary
        run: make build

      - name: Proto consistency check
        run: make proto-check

      - name: Integration tests
        run: make pytest

  build-release-artifacts:
    name: Build release artifacts
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: full-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Build artifact
        shell: bash
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -o dist/chat-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/chat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish-main-release:
    name: Publish artifacts to GitHub Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-release-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-latest
          name: Main branch latest build
          target_commitish: ${{ github.sha }}
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: release-assets/**/*
